<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Exotics Register</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #0d0d0d, #1a1a1a);
    color: #fff;
    margin: 0;
    padding: 15px;
    text-align: center;
}

/* TITLE */
h1 {
    color: #ff2b2b;
    font-size: 34px;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(255, 43, 43, 0.8);
}

/* SECTION TITLES */
.section-title {
    color: #ffffff;
    margin-top: 20px;
    margin-bottom: 12px;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* BUTTON GRID */
.services {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    max-width: 550px;
    margin: auto;
}

/* BUTTONS */
button {
    padding: 16px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(135deg, #cc0000, #ff2b2b);
    color: white;
    width: 100%;
    font-weight: bold;
    box-shadow: 0 0 12px rgba(255, 43, 43, 0.35);
    transition: all 0.2s ease;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 18px rgba(255, 43, 43, 0.7);
}

/* INVOICE BOX */
.box {
    margin-top: 25px;
    padding: 20px;
    border-radius: 16px;
    max-width: 550px;
    margin-left: auto;
    margin-right: auto;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 43, 43, 0.4);
    box-shadow: 0 0 20px rgba(255, 43, 43, 0.15);
    text-align: left;
}

/* INVOICE TITLE */
.box h3 {
    text-align: center;
    color: #ff2b2b;
    margin-top: 0;
}

/* INVOICE ITEMS */
.invoice-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* REMOVE BUTTON */
.remove-btn {
    background: transparent;
    color: #ff2b2b;
    font-size: 15px;
    border: 1px solid #ff2b2b;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    width: auto;
    box-shadow: none;
}

.remove-btn:hover {
    background: #ff2b2b;
    color: white;
}

/* TOTAL */
.total {
    font-size: 26px;
    font-weight: bold;
    text-align: center;
    margin-top: 15px;
    color: #ffffff;
}

/* RESET */
.actions {
    margin-top: 18px;
}

/* DESKTOP */
@media (min-width: 600px) {
    .services {
        grid-template-columns: 1fr 1fr;
    }

    h1 {
        font-size: 40px;
    }
}
</style>
</head>

<body>

<h1>Auto Exotics</h1>

<div class="section-title">Services</div>

<div class="services">
    <button onclick="addItem('Repairs', 50000)">Repairs ($50K)</button>
    <button onclick="addItem('Respray/Customization', 150000)">Respray/Customization ($150K)</button>
    <button onclick="addItem('Full Upgrades', 350000)">Full Upgrades ($350K)</button>
    <button onclick="addItem('Engine Swap', 350000)">Engine Swap ($350K)</button>
    <button onclick="addItem('Tune-Up/Service', 50000)">Tune-Up/Service ($50K)</button>
</div>

<!-- INVOICE -->
<div class="box">
    <h3>Invoice</h3>

    <div id="invoice"></div>

    <div class="total">
        Total: $<span id="total">0</span>
    </div>

    <div class="actions">
        <button onclick="resetOrder()">Reset Register</button>
    </div>
</div>

<script>
let total = 0;
let items = [];

function formatMoney(num) {
    return num.toLocaleString();
}

function addItem(name, price) {
    total += price;
    items.push({ name, price });
    updateDisplay();
}

function removeItem(index) {
    total -= items[index].price;
    items.splice(index, 1);
    updateDisplay();
}

function updateDisplay() {
    const invoiceDiv = document.getElementById("invoice");
    const totalSpan = document.getElementById("total");

    invoiceDiv.innerHTML = "";

    items.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "invoice-item";

        const text = document.createElement("span");
        text.textContent = `${item.name} - $${formatMoney(item.price)}`;

        const removeBtn = document.createElement("button");
        removeBtn.textContent = "Remove";
        removeBtn.className = "remove-btn";
        removeBtn.onclick = () => removeItem(index);

        row.appendChild(text);
        row.appendChild(removeBtn);
        invoiceDiv.appendChild(row);
    });

    totalSpan.textContent = formatMoney(total);
}

function resetOrder() {
    total = 0;
    items = [];
    updateDisplay();
}
</script>

</body>
</html>
